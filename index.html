<!DOCTYPE html>
<html>
<head>
  <title>Attendance App</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease;
    }

    h1 {
      margin-bottom: 20px;
      animation: slideDown 1s ease;
    }

    a {
      text-decoration: none;
      background: #667eea;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 18px;
      transition: 0.3s;
      display: inline-block;
    }

    a:hover {
      background: #5a67d8;
      transform: scale(1.1);
    }

    a:active {
      transform: scale(0.95);
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideDown {
      from {transform: translateY(-50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
  </style>
</head>

<body>

<div class="box">
  <h1>📊 Attendance Calculator</h1>
  <a href="attendance.html">🚀 Open App</a>
</div>

</body>
</html>
